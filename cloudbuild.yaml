steps:
  # Step 1: Build the Docker image using your existing Dockerfile
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'us-central1-docker.pkg.dev/rivue-app/cloud-run-source-deploy/gamified-study-tool/rivue-app:$COMMIT_SHA'
      - '.'
      
  # Step 2: Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'us-central1-docker.pkg.dev/rivue-app/cloud-run-source-deploy/gamified-study-tool/rivue-app:$COMMIT_SHA'

  # Step 3: Deploy the image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - your-cloud-run-service
      - '--image=us-central1-docker.pkg.dev/rivue-app/cloud-run-source-deploy/gamified-study-tool/rivue-app:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--quiet'
      - '--allow-unauthenticated'
options:
  logging: CLOUD_LOGGING_ONLY
images:
  - 'us-central1-docker.pkg.dev/rivue-app/cloud-run-source-deploy/gamified-study-tool/rivue-app:$COMMIT_SHA'
